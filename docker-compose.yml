# Local dev stack for the SiteV3 weather site.
# Usage: docker compose up --build   ->  http://localhost:8080
services:
  web:
    # php:5.4-apache is amd64-only; run under emulation on Apple Silicon.
    platform: linux/amd64
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        # Matches prod (php -v => 5.4.16).
        PHP_VERSION: "5.4"
    ports:
      - "8080:80"
    volumes:
      # Your working tree is served directly. Prod data files synced into
      # ./SiteV3 by scripts/sync-prod-data.sh appear here too (and are gitignored).
      - ./SiteV3:/var/www/html
    environment:
      # Guard for any local-only behaviour you add to cron scripts
      # (e.g. skip emailing / external exec when set).
      NW3_LOCAL_DEV: "1"
    depends_on:
      - mailpit

  # Catches PHP mail() so cron alert emails never leave your machine.
  # Web UI: http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

volumes:
  db_data:
