# Allow .htaccess (the site ships rewrite/redirect rules in SiteV3/.htaccess).
<Directory /var/www/html>
    AllowOverride All
    Require all granted
</Directory>

# IMG_ROOT is the URL prefix "/static-images/". On prod this is a separate
# static dir; locally we alias it to the synced copy inside the docroot.
Alias /static-images /var/www/html/static-images
<Directory /var/www/html/static-images>
    Require all granted
</Directory>

# Webcam/video archives live on mounted volumes in prod. Expose the local
# stubs so URLs that point at them don't 404 (they'll just be empty until synced).
Alias /webcam /mnt/webcam/html
Alias /vol1 /mnt/nw3-vol1/html
